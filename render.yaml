services:
  - type: web
    name: cloudless-server
    env: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    plan: starter
    autoDeploy: true
    envVars:
      - key: PORT
        value: 5001
      - key: PYTHON_BIN
        value: /usr/bin/python3
      - key: REDIS_URL
        fromService:
          type: redis
          name: cloudless-redis
          property: connectionString

  - type: redis
    name: cloudless-redis
    plan: starter
    ipAllowList: []

  - type: web
    name: cloudless-client
    env: docker
    dockerfilePath: ./client/Dockerfile
    dockerContext: ./client
    plan: starter
    autoDeploy: true
    envVars:
      - key: REACT_APP_API_URL
        value: https://cloudless-rb2w.onrender.com
      - key: REACT_APP_WS_URL
        value: wss://cloudless-rb2w.onrender.com
