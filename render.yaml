services:
  - type: web
    name: cloudless-server
    env: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    plan: starter
    autoDeploy: true
    envVars:
      - key: PORT
        value: 5001
      - key: PYTHON_BIN
        value: /usr/bin/python3

  - type: web
    name: cloudless-client
    env: docker
    dockerfilePath: ./client/Dockerfile
    dockerContext: ./client
    plan: starter
    autoDeploy: true
    envVars:
      - key: REACT_APP_API_URL
        value: https://cloudless-server.onrender.com
      - key: REACT_APP_WS_URL
        value: wss://cloudless-server.onrender.com
